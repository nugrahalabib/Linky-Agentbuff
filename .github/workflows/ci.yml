name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Prepare DB for tests
        run: |
          mkdir -p data
          DATABASE_URL="file:./linky.db" npx tsx scripts/migrate-sqlite.ts

      - name: Lint
        run: npm run lint
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          AUTH_SECRET: "ci-secret-minimum-24-chars-placeholder-xxxxxx"
          DATABASE_URL: "file:./linky.db"

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Next build
        run: npm run build
        env:
          AUTH_SECRET: "ci-secret-minimum-24-chars-placeholder-xxxxxx"
          DATABASE_URL: "file:./linky.db"
          NEXT_PUBLIC_APP_URL: "https://linky.agentbuff.id"
          NEXT_TELEMETRY_DISABLED: "1"

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: npm audit
        run: npm audit --audit-level=high --production || true
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
